<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Dark modern background with a subtle linear gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="petalGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="petalGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)"/>
  
  <!-- Sleek modern overlapping flower petals -->
  <g transform="translate(256, 256) scale(0.9)" filter="url(#glow)">
    <!-- Top-Left to Bottom-Right petals -->
    <path d="M 0 -40 C -80 -160, -160 -80, -40 0 C -160 80, -80 160, 0 40 C 80 160, 160 80, 40 0 C 160 -80, 80 -160, 0 -40 Z" fill="url(#petalGrad1)" opacity="0.8" />
    
    <!-- Top-Right to Bottom-Left petals -->
    <path d="M 40 0 C 160 -80, 80 -160, 0 -40 C -80 -160, -160 -80, -40 0 C -160 80, -80 160, 0 40 C 80 160, 160 80, 40 0 Z" fill="url(#petalGrad2)" opacity="0.8" transform="rotate(45)" />
    
    <!-- Inner core dot -->
    <circle cx="0" cy="0" r="16" fill="#ffffff" />
  </g>
</svg>
