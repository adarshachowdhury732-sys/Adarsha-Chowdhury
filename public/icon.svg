<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Smooth rounded square with rich deep space/astro gradient background -->
  <defs>
    <linearGradient id="astroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a051b"/>
      <stop offset="30%" stop-color="#1e0b36"/>
      <stop offset="70%" stop-color="#3b115c"/>
      <stop offset="100%" stop-color="#0c0422"/>
    </linearGradient>
    <radialGradient id="nebulaGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d946ef" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#8b5cf6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#f59e0b" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
    <filter id="superGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur1" />
      <feGaussianBlur stdDeviation="5" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main cosmic background -->
  <rect width="512" height="512" rx="140" fill="url(#astroGrad)"/>
  
  <!-- Outer nebulous space glow -->
  <circle cx="256" cy="256" r="220" fill="url(#nebulaGlow)"/>
  
  <!-- Golden orbital dust rings representing universal academia/learning -->
  <ellipse cx="256" cy="256" rx="160" ry="60" fill="none" stroke="#f59e0b" stroke-width="4" stroke-opacity="0.35" transform="rotate(-25, 256, 256)" />
  <ellipse cx="256" cy="256" rx="200" ry="40" fill="none" stroke="#d946ef" stroke-width="3" stroke-opacity="0.25" transform="rotate(15, 256, 256)" stroke-dasharray="10 12" />

  <!-- Centered golden glowing background star -->
  <circle cx="256" cy="256" r="60" fill="url(#goldGlow)" filter="url(#superGlow)"/>

  <!-- Centered glowing white & violet primary sparkle (four-pointed star) with smooth corners -->
  <path d="M 256 90 Q 256 256 422 256 Q 256 256 256 422 Q 256 256 90 256 Q 256 256 256 90 Z" fill="#ffffff" filter="url(#superGlow)"/>
  <!-- Gold inner core star -->
  <path d="M 256 160 Q 256 256 352 256 Q 256 256 256 352 Q 256 256 160 256 Q 256 256 256 160 Z" fill="#fbbf24"/>

  <!-- Secondary Magic Sparkle (Upper Right) -->
  <path d="M 370 110 Q 370 160 420 160 Q 370 160 370 210 Q 370 160 320 160 Q 370 160 370 110 Z" fill="#ffffff" filter="url(#superGlow)"/>
  <path d="M 370 130 Q 370 160 400 160 Q 370 160 370 190 Q 370 160 340 160 Q 370 160 370 130 Z" fill="#f59e0b" />

  <!-- Tertiary Magic Sparkle (Lower Left) -->
  <path d="M 140 330 Q 140 370 180 370 Q 140 370 140 410 Q 140 370 100 370 Q 140 370 140 330 Z" fill="#e9d5ff" />
</svg>
