<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Barsha — Your Intelligent Academic Companion</title>
    <!-- Search Engine Optimization and Indexing for Google Search -->
    <meta name="description" content="Barsha is a premium, highly intellectual AI-powered academic and search companion. Seamlessly analyze study papers, syllabus guidelines, complex coding challenges, and historical world literature with maximum speed." />
    <meta name="keywords" content="Barsha, Academic AI, Syllabus Solver, Exam Study, PYQ Solver, Space Grotesk, Universal AI Companion" />
    <meta name="robots" content="index, follow" />
    <!-- PWA Manifest & App Icons -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="theme-color" content="#8B5CF6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Barsha" />
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker registered successfully!', reg.scope))
            .catch(err => console.error('Service Worker registration failed:', err));
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
